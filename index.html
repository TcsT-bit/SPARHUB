<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#16a34a">
<link rel="manifest" href="manifest.json">
<title>SparesHub OMNI-HUB v5.7.3 GOD MODE</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{--bg:#0a0a0a;--card:#111827;--green:#16a34a;--red:#dc2626;--blue:#3b82f6;--gold:#fbbf24;--orange:#ea580c;--purple:#a855f7}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:manipulation}
body{background:var(--bg);color:#f1f5f9;font-size:14px}
.header{background:linear-gradient(135deg,#16a34a,#3b82f6,#a855f7);padding:12px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.hub-tabs{display:flex;gap:6px;overflow-x:auto;padding:12px;background:#111827;border-bottom:1px solid #1f2937}
.hub-btn{flex:0 0 auto;padding:12px 16px;background:#1f2937;border-radius:10px;border:2px solid #374151;font-weight:800;cursor:pointer;font-size:13px;white-space:nowrap}
.hub-btn.active{border-color:var(--green);background:var(--green);color:#000}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:12px;border:1px solid #1f2937}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:15px;margin-top:8px;background:var(--green);color:#000}
.btn-sm{padding:6px 10px;font-size:12px;width:auto;margin:2px}
.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-purple{background:var(--purple)}.btn-orange{background:var(--orange)}.btn-gold{background:var(--gold);color:#000}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.prod{background:#1f2937;padding:0;border-radius:12px;text-align:center;border:1px solid #374151;overflow:hidden;position:relative}
.prod img{width:100%;height:100px;object-fit:cover;background:#222}
.prod-body{padding:8px}
.delete-x{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;border-radius:50%;width:24px;height:24px;border:none;font-weight:800;z-index:2}
.stock-controls{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
input,textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #374151;background:#0a0a0a;color:#f1f5f9;margin-bottom:10px}
.notification{position:fixed;top:20px;right:20px;background:var(--green);color:#000;padding:12px;border-radius:10px;z-index:9999;display:none;font-weight:800}
.alert{background:var(--red);color:#fff;padding:10px;border-radius:10px;margin-bottom:12px;font-weight:800}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:999}
.modal.active{display:flex}
.modal-card{background:var(--card);padding:20px;border-radius:16px;max-width:700px;width:95%;max-height:90vh;overflow-y:auto}
.hidden{display:none}
.float-cart{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;border-radius:50px;padding:16px 24px;font-weight:800;z-index:99}
.share-box{background:#1f2937;padding:12px;border-radius:10px;margin:12px 0}
.badge{background:var(--purple);padding:2px 6px;border-radius:6px;font-size:10px}
.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.kpi-box{background:#1f2937;padding:10px;border-radius:10px;text-align:center}
.kpi-box b{font-size:18px;color:var(--gold)}
.row{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 #16a34a}70%{box-shadow:0 0 0 10px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
#reader{width:100%;border-radius:12px;overflow:hidden}
.catbox-help{font-size:11px;color:var(--gold);margin-top:-8px;margin-bottom:8px}
.catbox-frame{width:100%;height:400px;border:1px solid #374151;border-radius:10px;margin-bottom:8px;background:#000}
</style>
</head>
<body>

<div id="adminApp" class="hidden">
  <div class="header">
    <h1>⚡ OMNI-HUB v5.7.3 GOD MODE <span class="live-dot"></span> <span id="userName"></span></h1>
    <div><span style="font-size:12px;color:var(--gold)" id="roleBadge"></span><button class="btn-red" style="padding:8px 12px;margin-left:8px" onclick="logout()">EXIT</button></div>
  </div>
  <div class="notification" id="notification"></div>
  <div id="lowStockAlert"></div>

  <div id="scannerModal" class="modal"><div class="modal-card"><h2>📷 BARCODE SCANNER</h2><div id="reader"></div><button class="btn btn-red" onclick="stopScanner()">CLOSE</button></div></div>
  <div id="invoiceModal" class="modal"><div class="modal-card"><h2>🧾 INVOICE</h2>
    <input id="invCompany" value="SparesHub Pty Ltd"><input id="invReg" value="VAT: 4123456789">
    <input id="invClient" placeholder="Client Name" required><input id="invPhone" placeholder="Phone" required>
    <textarea id="invAddr" placeholder="Address" required></textarea>
    <button class="btn" onclick="saveInvoice()">GENERATE PDF + QR</button><button class="btn btn-red" onclick="closeModal('invoiceModal')">CANCEL</button>
  </div></div>
  <div id="qrcanvas" class="hidden"></div>

  <div class="share-box"><b>LINK:</b> <input id="clientLink" readonly onclick="this.select()"><button class="btn btn-blue btn-sm" onclick="copyLink()">COPY</button></div>
  <div class="card"><h3>📊 SALES DASHBOARD [LIVE]</h3><div class="kpi" id="dashboard"></div></div>
  <div class="card"><button class="btn btn-blue" onclick="startScanner()">📷 SCAN BARCODE</button></div>
  <div class="hub-tabs" id="hubTabs"></div>
  <div id="hubViews"></div>
  <div class="float-cart" onclick="openAdminCart()">🛒 <span id="adminCartCount">0</span> | R<span id="adminCartTotal">0.00</span></div>
  <div id="adminCartModal" class="modal"><div class="modal-card"><h2>🛒 CART</h2><div id="adminCartList"></div><button class="btn btn-gold" onclick="document.getElementById('invoiceModal').classList.add('active');closeModal('adminCartModal')">CREATE INVOICE</button><button class="btn btn-red" onclick="closeModal('adminCartModal')">CLOSE</button></div></div>
</div>

<div id="loginScreen" class="hidden"></div>
<div id="clientApp" class="hidden"></div>

<script>
const { jsPDF } = window.jspdf; // FIXED: const was missing
const WHATSAPP_NUMBER = '27698949596';
const LOW_STOCK_LIMIT = 10;

firebase.initializeApp({
    apiKey: "AIzaSyDU3m6DUDpXugBs-PW4Aqn_WvbbHbGq6mg",
    authDomain: "omega---dms.firebaseapp.com",
    projectId: "omega---dms",
    storageBucket: "omega---dms.firebasestorage.app",
    messagingSenderId: "194803652821",
    appId: "1:194803652821:web:07c6dc73aba1ce681a2a5c"
});
const db = firebase.firestore();

let CURRENT_USER={name:'CEO',role:'owner'}, CURRENT_ROLE='owner', ACTIVE_HUB='bricks', ADMIN_CART=[], HUBS={}, SALES_LOG=[], HTML5QrCode=null;

const DEFAULT_HUBS = {
  bricks:{name:'🧱 Bricks | Builders OS', kpis:{moq:'1000',delivery:'48H',credit:'30'}, products:[{sku:'B6',barcode:'6001234567890',name:'6" Brick NFX',price:3.20,stock:500,cost:2.10,img:'https://images.unsplash.com/photo-1591088398332-8a7791972843?w=300',specs:'14Mpa, SABS 227'}]},
  tavern:{name:'🍺 Tavern | Liquor OS', kpis:{license:'RICA',cold:'-4C',pos:'Scan'}, products:[{sku:'BEER',barcode:'6001234567891',name:'Castle Lager 500ml',price:22,stock:100,cost:15,img:'https://images.unsplash.com/photo-1608270586620-57bd79aacb6d?w=300',specs:'18+'}]}
};

function notify(msg){let n=document.getElementById('notification');n.textContent=msg;n.style.display='block';setTimeout(()=>n.style.display='none',2500);}
function closeModal(id){document.getElementById(id).classList.remove('active'); if(HTML5QrCode){HTML5QrCode.stop();}}
function copyLink(){navigator.clipboard.writeText(document.getElementById('clientLink').value);notify('Link Copied');}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}

async function loadHubs(){
  try{
    const doc = await db.collection('omnihub').doc('hubs').get();
    HUBS = doc.exists? doc.data() : DEFAULT_HUBS;
    if(!doc.exists) await db.collection('omnihub').doc('hubs').set(HUBS);
    const salesDoc = await db.collection('omnihub').doc('sales').get();
    SALES_LOG = salesDoc.exists? salesDoc.data().log||[] : [];
  }catch(e){console.error(e);notify('DB Error: Check Firestore Rules');HUBS=DEFAULT_HUBS;}
  checkLowStock(); renderDashboard(); renderAdminHubs();
}
async function saveHubs(){await db.collection('omnihub').doc('hubs').set(HUBS); checkLowStock();}
async function saveSales(){await db.collection('omnihub').doc('sales').set({log:SALES_LOG}); renderDashboard();}

function init(){
  document.getElementById('adminApp').classList.remove('hidden');
  document.getElementById('userName').textContent='CEO';
  document.getElementById('roleBadge').textContent='OWNER';
  document.getElementById('clientLink').value = location.origin + location.pathname;
  loadHubs();
  db.collection('omnihub').doc('hubs').onSnapshot(loadHubs);
  db.collection('omnihub').doc('sales').onSnapshot(loadHubs);
}
function logout(){location.reload();}

function renderDashboard(){
  let today = new Date().toDateString();
  let todaySales = SALES_LOG.filter(s=>new Date(s.date).toDateString()===today);
  let totalSales = todaySales.reduce((a,b)=>a+b.total,0);
  let totalProfit = todaySales.reduce((a,b)=>a+b.profit,0);
  let top = todaySales.length?todaySales.reduce((a,b)=>a.qty>b.qty?a:b):{name:'N/A',qty:0};
  let lowCount = Object.values(HUBS).flatMap(h=>h.products).filter(p=>p.stock<LOW_STOCK_LIMIT).length;
  document.getElementById('dashboard').innerHTML = `<div class="kpi-box"><small>SALES TODAY</small><br><b>R${totalSales.toFixed(2)}</b></div><div class="kpi-box"><small>PROFIT</small><br><b>R${totalProfit.toFixed(2)}</b></div><div class="kpi-box"><small>TOP ITEM</small><br><b>${top.name}</b></div><div class="kpi-box"><small>LOW STOCK</small><br><b>${lowCount}</b></div>`;
}

function checkLowStock(){
  let low = Object.entries(HUBS).flatMap(([k,h])=>h.products.filter(p=>p.stock<LOW_STOCK_LIMIT).map(p=>`${h.name.split('|')[0]}: ${p.name} ${p.stock}`));
  document.getElementById('lowStockAlert').innerHTML = low.length? `<div class="alert">⚠️ LOW STOCK: ${low.join(', ')}</div>` : '';
}

function startScanner(){document.getElementById('scannerModal').classList.add('active'); HTML5QrCode = new Html5Qrcode("reader"); HTML5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);}
function stopScanner(){closeModal('scannerModal');}
function onScanSuccess(code){stopScanner(); let p = Object.values(HUBS).flatMap(h=>h.products).find(x=>x.barcode===code); if(p){adminAddCart(p.sku); notify(`Scanned: ${p.name}`);} else{notify('Not found');}}

function renderAdminHubs(){
  document.getElementById('hubTabs').innerHTML = Object.keys(HUBS).map(k=>`<div class="hub-btn ${k===ACTIVE_HUB?'active':''}" onclick="switchAdminHub('${k}')">${HUBS[k].name}</div>`).join('');
  renderAdminView();
}
function switchAdminHub(h){ACTIVE_HUB=h;renderAdminHubs();}
function renderAdminView(){
  let h=HUBS[ACTIVE_HUB], p=h.products;
  document.getElementById('hubViews').innerHTML = `<div class="card"><h3>${h.name}</h3><div class="kpi">${Object.entries(h.kpis).map(([k,v])=>`<div class="kpi-box"><small>${k.toUpperCase()}</small><br><b>${v}</b></div>`).join('')}</div></div><div class="card"><h4>📦 INVENTORY</h4><div class="product-grid">${p.map((x,i)=>`<div class="prod"><button class="delete-x" onclick="deleteProduct(${i})">X</button><img src="${x.img||''}"><div class="prod-body">${x.name}<br>R${x.price}<br><small>Stock:${x.stock}</small><br><small>BC:${x.barcode||'N/A'}</small><br><span class="badge">${x.specs}</span><div class="stock-controls"><button class="btn-sm btn-orange" onclick="adjStock(${i},-1)">-1</button><button class="btn-sm btn-blue" onclick="adjStock(${i},1)">+1</button><button class="btn-sm btn-purple" onclick="setStock(${i})">SET</button><button class="btn-sm btn-blue" onclick="adminAddCart('${x.sku}')">+CART</button></div></div></div>`).join('')}</div><hr style="margin:12px 0"><h4>+ ADD PRODUCT</h4><input id="newSku" placeholder="SKU*"><input id="newBarcode" placeholder="Barcode*"><input id="newName" placeholder="Name*"><input id="newPrice" type="number" placeholder="Price*"><input id="newCost" type="number" placeholder="Cost"><input id="newStock" type="number" placeholder="Stock*" value="0"><input id="newSpecs" placeholder="Specs"><iframe src="https://catbox.moe" class="catbox-frame"></iframe><div class="catbox-help">1.Upload > Copy Link > 2.PASTE</div><div style="display:flex;gap:6px"><input id="newImgUrl" placeholder="Paste https://files.catbox.moe/xxx.jpg" oninput="previewUrl(this.value)" style="flex:1"><button class="btn-sm btn-gold" onclick="pasteLink()">📋 PASTE</button></div><img id="imgPreview" style="width:100%;max-height:120px;object-fit:cover;display:none;margin-top:8px"><button class="btn btn-purple" onclick="addProduct()">SAVE PRODUCT</button></div><div class="card"><h4>🧾 INVOICE</h4><button class="btn btn-gold" onclick="ADMIN_CART.length?document.getElementById('invoiceModal').classList.add('active'):notify('Add items first')">OPEN INVOICE</button></div>`;
}

async function pasteLink(){
  try{
    const text = await navigator.clipboard.readText();
    if(text.startsWith('https://files.catbox.moe/')){
      document.getElementById('newImgUrl').value = text; previewUrl(text); notify('Pasted ✅');
    }else{notify('No Catbox link');}
  }catch(e){notify('Clipboard denied');}
function previewUrl(url){document.getElementById('imgPreview').style.display=url.startsWith('http')?'block':'none';document.getElementById('imgPreview').src=url;}

async function addProduct(){
  let sku=document.getElementById('newSku').value.toUpperCase().trim();
  let barcode=document.getElementById('newBarcode').value.trim();
  let name=document.getElementById('newName').value.trim();
  let price=parseFloat(document.getElementById('newPrice').value);
  let stock=parseInt(document.getElementById('newStock').value);
  if(!sku||!barcode||!name||isNaN(price)||isNaN(stock))return notify('SKU, Barcode, Name, Price, Stock required');
  HUBS[ACTIVE_HUB].products.push({sku,barcode,name,price,cost:parseFloat(document.getElementById('newCost').value)||0,stock,specs:document.getElementById('newSpecs').value,img:document.getElementById('newImgUrl').value.trim()});
  await saveHubs();notify('Added');['newSku','newBarcode','newName','newPrice','newCost','newStock','newSpecs','newImgUrl'].forEach(id=>document.getElementById(id).value='');document.getElementById('imgPreview').style.display='none';
}
async function deleteProduct(i){if(confirm('DELETE?')){HUBS[ACTIVE_HUB].products.splice(i,1);await saveHubs();notify('Deleted');}}
async function adjStock(i,delta){HUBS[ACTIVE_HUB].products[i].stock=Math.max(0,HUBS[ACTIVE_HUB].products[i].stock+delta);await saveHubs();}
async function setStock(i){let val=prompt('Set stock:');let num=parseInt(val);if(!isNaN(num)){HUBS[ACTIVE_HUB].products[i].stock=num;await saveHubs();}}

function adminAddCart(sku){let x=HUBS[ACTIVE_HUB].products.find(i=>i.sku===sku);if(x.stock<=0)return notify('OUT OF STOCK');let ex=ADMIN_CART.find(i=>i.sku===sku);ex?ex.qty++:ADMIN_CART.push({...x,qty:1});notify(`Added ${x.name}`);updateAdminCartFloat();}
function updateAdminCartFloat(){document.getElementById('adminCartCount').textContent=ADMIN_CART.reduce((a,b)=>a+b.qty,0);document.getElementById('adminCartTotal').textContent=ADMIN_CART.reduce((a,b)=>a+b.price*b.qty,0).toFixed(2);}
function openAdminCart(){document.getElementById('adminCartList').innerHTML=ADMIN_CART.map((i,idx)=>`<div class="row"><span>${i.name} x${i.qty}</span><button class="btn-red btn-sm" onclick="ADMIN_CART.splice(${idx},1);openAdminCart();updateAdminCartFloat()">x</button></div>`).join('')||'Cart Empty';document.getElementById('adminCartModal').classList.add('active');}

async function saveInvoice(){
  if(ADMIN_CART.length===0)return notify('Cart empty');
  const client=document.getElementById('invClient').value.trim();
  const phone=document.getElementById('invPhone').value.trim();
  const addr=document.getElementById('invAddr').value.trim();
  if(!client||!phone||!addr)return notify('Fill all fields');

  const doc=new jsPDF(); const invNo='INV'+Date.now();
  const subtotal=ADMIN_CART.reduce((a,b)=>a+b.price*b.qty,0); const vat=subtotal*0.15; const total=subtotal+vat; const profit=ADMIN_CART.reduce((a,b)=>(b.price-b.cost)*b.qty,0);
  doc.text(document.getElementById('invCompany').value,14,20);doc.text(document.getElementById('invReg').value,14,27);doc.text('INVOICE: '+invNo,140,20);doc.text(new Date().toLocaleDateString(),140,27);
  doc.text('BILL TO:',14,40);doc.text(client,14,46);doc.text(phone,14,52);doc.text(addr,14,58);
  let y=75;doc.text('ITEM',14,y);doc.text('QTY',90,y);doc.text('PRICE',120,y);doc.text('TOTAL',160,y);y+=8;
  ADMIN_CART.forEach(i=>{doc.text(i.name.substring(0,25),14,y);doc.text(i.qty.toString(),90,y);doc.text('R'+i.price,120,y);doc.text('R'+(i.price*i.qty).toFixed(2),160,y);y+=7;});
  y+=5;doc.text('Subtotal: R'+subtotal.toFixed(2),140,y);y+=7;doc.text('VAT 15%: R'+vat.toFixed(2),140,y);y+=7;doc.setFontSize(12);doc.text('TOTAL: R'+total.toFixed(2),140,y);
  document.getElementById('qrcanvas').innerHTML='';new QRCode(document.getElementById('qrcanvas'), {text:invNo+'|R'+total.toFixed(2),width:64,height:64});
  doc.addImage(document.getElementById('qrcanvas').querySelector('img').src,'PNG',140,y+5,30,30);doc.save(invNo+'.pdf');
  SALES_LOG.push({date:new Date().toISOString(),inv:invNo,total,profit,user:CURRENT_USER.name,items:ADMIN_CART.map(i=>({name:i.name,qty:i.qty})),topItem:ADMIN_CART.reduce((a,b)=>a.qty>b.qty?a:b).name});
  await saveSales();ADMIN_CART.forEach(item=>{let prod=Object.values(HUBS).flatMap(h=>h.products).find(p=>p.sku===item.sku);if(prod)prod.stock=Math.max(0,prod.stock-item.qty);});await saveHubs();
  ADMIN_CART.length=0;updateAdminCartFloat();closeModal('invoiceModal');notify('PDF Generated');
}

init(); // GOD MODE BOOT
</script>
</body>
</html>
