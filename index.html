<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNI-HUB ERP v5.8 CATBOX</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<style>
body{font-family:'Inter',sans-serif;background:#0d1117;color:#c9d1d9} 
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;margin-bottom:12px} 
.btn{padding:8px 14px;border-radius:8px;font-weight:600;cursor:pointer;transition:.2s;border:none} 
.btn:hover{opacity:.85} 
.btn-primary{background:#16a34a;color:#fff} 
.btn-danger{background:#ef4444;color:#fff} 
.btn-amber{background:#f59e0b;color:#111} 
.btn-blue{background:#2563eb;color:#fff} 
.btn-purple{background:#8b5cf6;color:#fff} 
input,select,textarea{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:8px;padding:8px;width:100%;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:12px} 
th,td{padding:8px;border-bottom:1px solid #30363d;text-align:left} 
th{background:#21262d;position:sticky;top:0} 
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:50;padding:10px} 
.modal-content{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;max-width:900px;width:100%;max-height:90vh;overflow:auto}
#barcodeCanvas,#qrCanvas{display:none}
img.thumb{width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid #30363d}
</style>
</head>
<body>
<div class="p-4 max-w-7xl mx-auto">
  <h1 class="text-2xl font-bold text-green-400 mb-2">⚙️ OMNI-HUB ERP v5.8 CATBOX</h1>
  <p class="text-sm text-gray-400 mb-4">Firebase Firestore + Catbox.moe Images = R0/MO</p>
  
  <div id="loginBox" class="card max-w-sm mx-auto">
    <h2 class="text-xl font-bold mb-3">Login</h2>
    <input id="pin" type="password" placeholder="PIN" value="1234">
    <button class="btn btn-primary w-full mt-3" onclick="login()">Enter</button>
  </div>

  <div id="app" style="display:none">
    <div class="flex flex-wrap gap-2 mb-4">
      <button class="btn btn-primary" onclick="switchHub('scrap')">Scrap</button>
      <button class="btn btn-primary" onclick="switchHub('house')">House</button>
      <button class="btn btn-primary" onclick="switchHub('workshop')">Workshop</button>
      <button class="btn btn-primary" onclick="switchHub('spares')">Spares</button>
      <button class="btn btn-primary" onclick="switchHub('boss')">Boss</button>
      <button class="btn btn-amber" onclick="openPos()">POS</button>
      <button class="btn btn-blue" onclick="openStock()">Stock</button>
      <button class="btn btn-purple" onclick="exportAll()">Export ZIP</button>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
    <div id="hubTitle" class="text-xl font-bold mb-3"></div>
    <div id="hubContent"></div>
  </div>
</div>

<canvas id="barcodeCanvas"></canvas>
<canvas id="qrCanvas"></canvas>

<div id="posModal" class="modal"><div class="modal-content"><h2 class="text-xl font-bold mb-3">POS</h2><input id="posBarcode" placeholder="Scan Barcode" onkeyup="if(event.key==='Enter')addToCart()"><div id="posCart" class="mt-3"></div><div id="posTotal" class="font-bold mt-2"></div><button class="btn btn-primary mt-3" onclick="checkout()">Checkout PDF</button><button class="btn mt-3" onclick="closePos()">Close</button></div></div>
<div id="stockModal" class="modal"><div class="modal-content"><h2 class="text-xl font-bold mb-3">Stock Management</h2><div id="stockList"></div><button class="btn mt-3" onclick="closeStock()">Close</button></div></div>

<script>
const firebaseConfig={apiKey:"AIzaSyDpj4cAajVUTyPrUmkPIET0fjbTaOdmah0",authDomain:"omega---dms.firebaseapp.com",projectId:"omega---dms",storageBucket:"omega---dms.firebasestorage.app",messagingSenderId:"143843997851",appId:"1:143843997851:web:fe845a40c6939e7f4efc98"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const DOC_REF=db.collection('omni_hub').doc('data_v58');

let HUBS={scrap:{name:'Scrap Hub',products:[]},house:{name:'House Hub',products:[]},workshop:{name:'Workshop Hub',products:[]},spares:{name:'Spares Hub',products:[]},boss:{name:'Boss Hub',products:[]}};
let ACTIVE_HUB='scrap';let CART=[];let UPLOADED_FILE=null;let UPLOAD_URL='';

function notify(m){alert(m)}
function login(){if(document.getElementById('pin').value==='1234'){document.getElementById('loginBox').style.display='none';document.getElementById('app').style.display='block';loadHubs();}else notify('Wrong PIN')}
function logout(){document.getElementById('app').style.display='none';document.getElementById('loginBox').style.display='block'}

async function loadHubs(){let snap=await DOC_REF.get();if(snap.exists)HUBS=snap.data().hubs;renderHub()}
async function saveHubs(){await DOC_REF.set({hubs:HUBS,updated:Date.now()})}

function switchHub(h){ACTIVE_HUB=h;renderHub()}
function renderHub(){document.getElementById('hubTitle').innerText=HUBS[ACTIVE_HUB].name;let html=`<div class="card"><h3 class="font-bold mb-2">Add Product</h3><div class="grid grid-cols-2 gap-2">`;
html+=`<input id="newSku" placeholder="SKU"><input id="newBarcode" placeholder="Barcode"><input id="newName" placeholder="Name"><input id="newPrice" type="number" placeholder="Price">`;
html+=`<input id="newCost" type="number" placeholder="Cost"><input id="newStock" type="number" placeholder="Stock"><input id="newSpecs" placeholder="Specs">`;
if(ACTIVE_HUB==='scrap')html+=`<input id="newVin" placeholder="VIN">`;
html+=`<input id="newImg" type="file" accept="image/*" onchange="uploadCatbox(event)">`;
html+=`</div><img id="imgPreview" class="thumb mt-2" style="display:none"><button class="btn btn-primary mt-2" onclick="addProduct()">Add Product</button></div>`;
html+=`<div class="card"><input id="search" placeholder="Search SKU/Name/Barcode" onkeyup="renderTable()"><table><thead><tr><th>Img</th><th>SKU</th><th>Name</th><th>Barcode</th><th>Price</th><th>Stock</th><th></th></tr></thead><tbody id="tbl"></tbody></table></div>`;
document.getElementById('hubContent').innerHTML=html;renderTable()
}

function renderTable(){let q=document.getElementById('search')?.value.toLowerCase()||'';let rows=HUBS[ACTIVE_HUB].products.filter(p=>p.sku.toLowerCase().includes(q)||p.name.toLowerCase().includes(q)||p.barcode.includes(q)).map((p,i)=>`<tr><td>${p.img?`<img src="${p.img}" class="thumb">`:''}</td><td>${p.sku}</td><td>${p.name}</td><td>${p.barcode}</td><td>R${p.price}</td><td>${p.stock}</td><td><button class="btn btn-danger text-xs" onclick="delProd(${i})">Del</button></td></tr>`).join('');document.getElementById('tbl').innerHTML=rows||'<tr><td colspan="7">No products</td></tr>'}
function delProd(i){HUBS[ACTIVE_HUB].products.splice(i,1);saveHubs();renderTable();notify('Deleted')}

// CATBOX UPLOAD = THE GOD TIER FIX
async function uploadCatbox(e){
  let file=e.target.files[0];if(!file)return;
  document.getElementById('imgPreview').src='';document.getElementById('imgPreview').style.display='none';
  notify('Uploading to Catbox...');
  let fd=new FormData();fd.append('reqtype','fileupload');fd.append('fileToUpload',file);
  try{
    let res=await fetch('https://catbox.moe/user/api.php',{method:'POST',body:fd});
    let url=await res.text();
    if(url.startsWith('http')){UPLOAD_URL=url;document.getElementById('imgPreview').src=url;document.getElementById('imgPreview').style.display='block';notify('Image OK')}
    else notify('Catbox Error: '+url)
  }catch(err){notify('Upload failed: '+err.message)}
}

async function addProduct(){
  let sku=document.getElementById('newSku').value.toUpperCase().trim();
  let barcode=document.getElementById('newBarcode').value.trim();
  let name=document.getElementById('newName').value.trim();
  let price=parseFloat(document.getElementById('newPrice').value);
  let stock=parseInt(document.getElementById('newStock').value);
  if(!sku||!barcode||!name||isNaN(price)||isNaN(stock))return notify('SKU, Barcode, Name, Price, Stock required');
  let obj={sku,barcode,name,price,cost:parseFloat(document.getElementById('newCost').value)||0,stock,specs:document.getElementById('newSpecs').value,img:UPLOAD_URL||''};
  if(ACTIVE_HUB==='scrap'){obj.vin=document.getElementById('newVin').value.toUpperCase().trim();if(!obj.vin)return notify('VIN required for Scrap')}
  HUBS[ACTIVE_HUB].products.push(obj);
  await saveHubs();notify('Product Added + Synced');UPLOAD_URL='';
  ['newSku','newBarcode','newName','newPrice','newCost','newStock','newSpecs','newVin'].forEach(id=>{let el=document.getElementById(id); if(el)el.value='';});document.getElementById('imgPreview').style.display='none';
}

function openPos(){CART=[];document.getElementById('posModal').style.display='flex';document.getElementById('posBarcode').focus()}
function closePos(){document.getElementById('posModal').style.display='none'}
function addToCart(){let code=document.getElementById('posBarcode').value.trim();let p=HUBS[ACTIVE_HUB].products.find(x=>x.barcode===code);if(!p)return notify('Not found');let c=CART.find(x=>x.barcode===code);if(c)c.qty++;else CART.push({...p,qty:1});document.getElementById('posBarcode').value='';renderCart()}
function renderCart(){let html=CART.map((c,i)=>`<div>${c.name} x${c.qty} R${c.price*c.qty} <button onclick="CART.splice(${i},1);renderCart()">X</button></div>`).join('');document.getElementById('posCart').innerHTML=html;document.getElementById('posTotal').innerText='Total: R'+CART.reduce((a,b)=>a+b.price*b.qty,0)}
async function checkout(){if(!CART.length)return notify('Cart empty');CART.forEach(c=>{let p=HUBS[ACTIVE_HUB].products.find(x=>x.barcode===c.barcode);if(p)p.stock-=c.qty});await saveHubs();let el=document.createElement('div');el.innerHTML=`<h1>Invoice</h1>${CART.map(c=>`<div>${c.name} x${c.qty} R${c.price*c.qty}</div>`).join('')}<h2>Total R${CART.reduce((a,b)=>a+b.price*b.qty,0)}</h2>`;html2pdf().from(el).save('invoice.pdf');CART=[];renderCart();closePos();notify('Sale done')}

function openStock(){let html=HUBS[ACTIVE_HUB].products.map((p,i)=>`<div class="flex justify-between border-b py-1"><div>${p.name} Stock:${p.stock}</div><div><input type="number" id="s${i}" value="${p.stock}" style="width:80px"><button class="btn btn-primary text-xs ml-1" onclick="updStock(${i})">Save</button></div></div>`).join('');document.getElementById('stockList').innerHTML=html||'No products';document.getElementById('stockModal').style.display='flex'}
function closeStock(){document.getElementById('stockModal').style.display='none'}
async function updStock(i){HUBS[ACTIVE_HUB].products[i].stock=parseInt(document.getElementById('s'+i).value);await saveHubs();notify('Stock updated');openStock()}

async function exportAll(){let zip=new JSZip();Object.keys(HUBS).forEach(h=>{let ws=XLSX.utils.json_to_sheet(HUBS[h].products);let wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Products');zip.file(h+'.xlsx',XLSX.write(wb,{type:'array'}))});zip.generateAsync({type:'blob'}).then(b=>saveAs(b,'OMNI_HUB.zip'));notify('Exported')}
</script>
</body>
</html>
