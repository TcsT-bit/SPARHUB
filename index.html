<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SparesHub OMNI-HUB v2.0.1 EMPIRE</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
<style>
:root{--bg:#0a0a0a;--card:#111827;--green:#16a34a;--red:#dc2626;--blue:#3b82f6;--gold:#fbbf24;--orange:#ea580c;--purple:#a855f7}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:manipulation}
body{background:var(--bg);color:#f1f5f9;font-size:14px}
.header{background:linear-gradient(135deg,#16a34a,#3b82f6,#a855f7);padding:12px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between}
.header h1{font-size:16px;font-weight:800}
.hub-tabs{display:flex;gap:6px;overflow-x:auto;padding:12px;background:#111827;border-bottom:1px solid #1f2937}
.hub-btn{flex:0 0 auto;padding:12px 16px;background:#1f2937;border-radius:10px;border:2px solid #374151;font-weight:800;cursor:pointer;font-size:13px}
.hub-btn.active{border-color:var(--green);background:var(--green);color:#000}
.hub-view{display:none;padding:12px}
.hub-view.active{display:block}
.sub-tabs{display:flex;gap:6px;margin-bottom:12px;border-bottom:1px solid #374151;overflow-x:auto}
.sub-btn{flex:0 0 auto;padding:10px 14px;background:transparent;border:none;color:#9ca3af;font-weight:700;cursor:pointer;border-bottom:2px solid transparent}
.sub-btn.active{color:var(--green);border-color:var(--green)}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:12px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:15px;margin-top:8px;background:var(--green);color:#000}
.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-orange{background:var(--orange)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.prod{background:#1f2937;padding:10px;border-radius:10px;cursor:pointer;text-align:center;border:1px solid #374151}
.table{width:100%;font-size:12px;border-collapse:collapse}
.table th{text-align:left;padding:8px;border-bottom:1px solid #374151}
.table td{padding:8px;border-bottom:1px solid #1f2937}
input,select{width:100%;padding:12px;border-radius:8px;border:1px solid #374151;background:#0a0a0a;color:#f1f5f9;margin-bottom:10px}
.notification{position:fixed;top:20px;right:20px;background:var(--green);color:#000;padding:12px;border-radius:10px;z-index:9999;display:none;font-weight:800}
.row{display:flex;gap:8px;align-items:center}
.qty-btn{background:#374151;border:none;color:#fff;padding:10px 14px;border-radius:8px;font-size:18px;font-weight:800}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:999}
.modal.active{display:flex}
.modal-card{background:var(--card);padding:20px;border-radius:16px;max-width:500px;width:90%}
.warning{background:#f59e0b;color:#000;padding:10px;border-radius:8px;font-weight:700;text-align:center}
</style>
</head>
<body>

<div class="header"><h1>⚡ OMNI-HUB v2.0.1 EMPIRE</h1><span style="font-size:12px;color:var(--gold)">OFFLINE MODE</span></div>
<div class="notification" id="notification"></div>
<div id="ageModal" class="modal"><div class="modal-card"><h2>🍺 TAVERN COMPLIANCE</h2><div class="warning">Customer Over 18? ID Checked?</div><button class="btn" onclick="ageConfirm(true)">YES</button><button class="btn btn-red" onclick="ageConfirm(false)">NO</button></div></div>

<div class="hub-tabs" id="hubTabs"></div>
<div id="hubViews"></div>

<script>
const { jsPDF } = window.jspdf;
const firebaseConfig = {apiKey: "OFFLINE_MODE", authDomain: "offline.local", projectId: "offline"};

let db, ACTIVE_HUB='bricks', ACTIVE_SUB='sell', CART=[], PENDING_ALCOHOL=null;

const HUBS = {
  bricks:{name:'🧱 Bricks', subs:['sell','invoices','stock','reports'], products:[{sku:'B6',name:'6" Brick',price:3.20,stock:500},{sku:'B4',name:'4" Brick',price:2.80,stock:400},{sku:'MAXI',name:'Maxi Brick',price:4.50,stock:200}]},
  tavern:{name:'🍺 Tavern', subs:['sell','invoices','stock','reports','compliance'], products:[{sku:'BEER',name:'Castle 500ml',price:22,stock:100,alcohol:true},{sku:'BRANDY',name:'Klippies 750ml',price:185,stock:20,alcohol:true},{sku:'DEP',name:'Bottle Deposit',price:5,stock:0}]},
  chickens:{name:'🐔 Chickens', subs:['sell','invoices','stock','reports','scale'], products:[{sku:'CHICK',name:'Live Chicken/kg',price:28,stock:100}]},
  diesel:{name:'⛽ Diesel', subs:['sell','invoices','stock','reports','pump'], products:[{sku:'DSL',name:'Diesel/L',price:24.50,stock:5000}]},
  sand:{name:'🏜️ Sand', subs:['sell','invoices','stock','reports','weigh'], products:[{sku:'RIVER',name:'River Sand/m³',price:450,stock:100}]},
  water:{name:'💧 Water', subs:['sell','invoices','stock','reports'], products:[{sku:'WATER25',name:'Water 25L Drum',price:35,stock:50},{sku:'TANKER',name:'5000L Tanker',price:850,stock:10}]},
  scrap:{name:'🔩 Scrap', subs:['sell','invoices','stock','reports','vin'], products:[{sku:'TYRE15',name:'VW Tyre 15"',price:350,stock:12,vin:'WVWZZZ'},{sku:'MAG',name:'BMW Mag',price:800,stock:8,vin:'WBAZZZ'}]},
  transport:{name:'🚌 Transport', subs:['sell','invoices','stock','reports','seats'], products:[{sku:'JHB',name:'Polokwane-JHB',price:80,stock:20},{sku:'NLS',name:'Polokwane-Nelspruit',price:120,stock:20}]},
  restaurant:{name:'🍔 Restaurant', subs:['sell','invoices','stock','reports','kitchen'], products:[{sku:'BURGER',name:'Burger',price:55,stock:0,mods:[{n:'+Cheese',p:5}]},{sku:'MEAL',name:'Pap+Chicken',price:65,stock:0}]}
};

function notify(msg){let n=document.getElementById('notification');n.textContent=msg;n.style.display='block';setTimeout(()=>n.style.display='none',2500);}

function init(){renderHubTabs();switchHub('bricks');}

function renderHubTabs(){document.getElementById('hubTabs').innerHTML = Object.keys(HUBS).map(k=>`<div class="hub-btn ${k===ACTIVE_HUB?'active':''}" onclick="switchHub('${k}')">${HUBS[k].name}</div>`).join('');}

function switchHub(hub){ACTIVE_HUB=hub; ACTIVE_SUB='sell'; renderHubTabs();
  let view = document.getElementById('hubViews');
  let subs = HUBS[hub].subs;
  view.innerHTML = `<div class="hub-view active"><div class="sub-tabs">${subs.map(s=>`<button class="sub-btn ${s===ACTIVE_SUB?'active':''}" onclick="switchSub('${s}')">${s.toUpperCase()}</button>`).join('')}</div><div id="subContent"></div></div>`;
  renderSub();
}

function switchSub(sub){ACTIVE_SUB=sub;document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderSub();}

function renderSub(){
  let c = document.getElementById('subContent'); let p = HUBS[ACTIVE_HUB].products || [];
  if(ACTIVE_SUB==='sell'){c.innerHTML = `<div class="card"><h3>SELL</h3><div class="product-grid">${p.map(x=>`<div class="prod" onclick="sellItem('${x.sku}')">${x.name}<br>R${x.price}<br><small>Stock:${x.stock}</small></div>`).join('')}</div>${HUBS[ACTIVE_HUB].subs.includes('pump')?`<button class="btn btn-orange" onclick="openPump()">PUMP CONTROLS</button>`:''}${HUBS[ACTIVE_HUB].subs.includes('scale')?`<button class="btn btn-blue" onclick="notify('BT Scale coming v2.2')">CONNECT SCALE</button>`:''}<button class="btn" onclick="genInvoice()">CART: ${CART.length} > INVOICE</button></div>`;}
  if(ACTIVE_SUB==='invoices'){c.innerHTML = `<div class="card"><h3>INVOICES</h3><button class="btn" onclick="newInvoice()">+ NEW INVOICE</button><table class="table"><tr><th>INV#</th><th>Total</th><th>Print</th></tr>${JSON.parse(localStorage.getItem(ACTIVE_HUB+'_inv')||'[]').map(i=>`<tr><td>${i.id}</td><td>R${i.total}</td><td><button onclick="printInv('${i.id}')">🖨️</button></td></tr>`).join('')||'<tr><td colspan=3>No Invoices</td></tr>'}</table></div>`;}
  if(ACTIVE_SUB==='stock'){c.innerHTML = `<div class="card"><h3>STOCK TAKE</h3>${p.map(x=>`<div class="row"><input value="${x.name}" readonly><input type="number" id="st_${x.sku}" value="${x.stock}"><button class="btn btn-blue" onclick="saveStock('${x.sku}')">Save</button></div>`).join('')}</div>`;}
  if(ACTIVE_SUB==='reports'){let invs=JSON.parse(localStorage.getItem(ACTIVE_HUB+'_inv')||'[]');let total=invs.reduce((a,b)=>a+parseFloat(b.total),0);c.innerHTML = `<div class="card"><h3>REPORTS</h3><p>Total Invoices: ${invs.length}</p><p>Total Sales: R${total.toFixed(2)}</p><button class="btn" onclick="notify('CSV Export v2.2')">EXPORT CSV</button></div>`;}
  if(ACTIVE_SUB==='pump'){c.innerHTML = `<div class="card"><h3>⛽ DIESEL PUMP</h3><input id="dieselL" type="number" value="0"><div class="row"><button class="qty-btn" onclick="adjL(-10)">-10</button><button class="qty-btn" onclick="adjL(1)">+1</button><button class="qty-btn" onclick="adjL(10)">+10</button></div><h3 id="dTotal">R0.00</h3><button class="btn" onclick="addDiesel()">ADD TO CART</button></div>`;}
  if(ACTIVE_SUB==='vin'){c.innerHTML = `<div class="card"><h3>🔩 VIN SCAN</h3><input id="vin" placeholder="WVWZZZ..."><button class="btn btn-blue" onclick="scanVIN()">SEARCH</button><div id="vinRes"></div></div>`;}
  if(ACTIVE_SUB==='seats'){c.innerHTML = `<div class="card"><h3>🚌 SEAT MAP</h3><div class="product-grid">${Array.from({length:20},(_,i)=>`<div class="prod" onclick="sellSeat(${i+1})">Seat ${i+1}</div>`).join('')}</div></div>`;}
  if(ACTIVE_SUB==='kitchen'){c.innerHTML = `<div class="card"><h3>🍔 KITCHEN</h3>${p.map(x=>`<div class="prod" onclick="sellMeal('${x.sku}')">${x.name} R${x.price}</div>`).join('')}</div>`;}
  if(ACTIVE_SUB==='compliance'){c.innerHTML = `<div class="card"><h3>🍺 COMPLIANCE LOG</h3><p>All alcohol sales require ID check.</p></div>`;}
  if(ACTIVE_SUB==='weigh'){c.innerHTML = `<div class="card"><h3>🏜️ WEIGHBRIDGE</h3><input id="in" placeholder="IN kg"><input id="out" placeholder="OUT kg"><button class="btn" onclick="calcSand()">CALC m³</button><h3 id="sandRes"></h3></div>`;}
}

function sellItem(sku){let x=HUBS[ACTIVE_HUB].products.find(i=>i.sku===sku);if(x.alcohol){PENDING_ALCOHOL=x;document.getElementById('ageModal').classList.add('active');return;}if(x.stock<=0)return notify('OUT OF STOCK');CART.push(x);x.stock--;notify(`Added ${x.name}`);}
function ageConfirm(ok){document.getElementById('ageModal').classList.remove('active');if(ok){CART.push(PENDING_ALCOHOL);PENDING_ALCOHOL.stock--;notify('Added Alcohol');}}
function genInvoice(){if(CART.length===0)return notify('Cart empty');let total=CART.reduce((a,b)=>a+b.price,0)*1.15;let inv={id:'INV'+Date.now(),items:CART,total:total.toFixed(2)};let arr=JSON.parse(localStorage.getItem(ACTIVE_HUB+'_inv')||'[]');arr.push(inv);localStorage.setItem(ACTIVE_HUB+'_inv',JSON.stringify(arr));printInv(inv.id);CART=[];notify('Invoice Created ✓');renderSub();}
function newInvoice(){genInvoice();}
function printInv(id){let arr=JSON.parse(localStorage.getItem(ACTIVE_HUB+'_inv')||'[]');let inv=arr.find(i=>i.id===id);let doc=new jsPDF({unit:'mm',format:[80,200]});doc.setFontSize(14);doc.text('SPARHUB',40,10,{align:'center'});doc.setFontSize(10);doc.text(`INV: ${inv.id}`,5,20);inv.items.forEach((it,i)=>doc.text(`${it.name} R${it.price}`,5,30+i*6));doc.text(`TOTAL R${inv.total}`,5,50);window.open(doc.output('bloburl'),'_blank');}
function saveStock(sku){let x=HUBS[ACTIVE_HUB].products.find(i=>i.sku===sku);x.stock=parseInt(document.getElementById('st_'+sku).value);notify('Stock Saved');}
function openPump(){switchSub('pump');}
function adjL(v){let l=parseFloat(document.getElementById('dieselL').value)+v;if(l<0)l=0;document.getElementById('dieselL').value=l;document.getElementById('dTotal').textContent='R'+(l*24.5).toFixed(2);}
function addDiesel(){let l=parseFloat(document.getElementById('dieselL').value);CART.push({name:`Diesel ${l}L`,price:l*24.5});notify(`Added ${l}L`);document.getElementById('dieselL').value=0;adjL(0);}
function scanVIN(){let v=document.getElementById('vin').value.toUpperCase();let res=HUBS.scrap.products.filter(p=>p.vin&&v.includes(p.vin));document.getElementById('vinRes').innerHTML=res.map(p=>`<div class="prod" onclick="sellItem('${p.sku}')">${p.name} R${p.price}</div>`).join('')||'No match';}
function sellSeat(n){CART.push({name:`Seat ${n}`,price:HUBS.transport.products[0].price});notify(`Seat ${n} added`);}
function sellMeal(sku){let x=HUBS.restaurant.products.find(i=>i.sku===sku);CART.push(x);notify(`${x.name} to Kitchen`);}
function calcSand(){let inW=parseFloat(document.getElementById('in').value)||0;let outW=parseFloat(document.getElementById('out').value)||0;let m3=((inW-outW)/1500).toFixed(2);document.getElementById('sandRes').textContent=`${m3} m³ = R${m3*450}`;}

init();
</script>
</body>
</html>
