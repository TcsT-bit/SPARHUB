<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SparesHub OMNI-HUB v4.0.0</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#0a0a0a;--card:#111827;--green:#16a34a;--red:#dc2626;--blue:#3b82f6;--gold:#fbbf24;--orange:#ea580c;--purple:#a855f7}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:manipulation}
body{background:var(--bg);color:#f1f5f9;font-size:14px}
.header{background:linear-gradient(135deg,#16a34a,#3b82f6,#a855f7);padding:12px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.client-header{background:#111827;padding:12px;text-align:center}
.client-header h1{font-size:20px}
.hub-tabs{display:flex;gap:6px;overflow-x:auto;padding:12px;background:#111827;border-bottom:1px solid #1f2937}
.hub-btn{flex:0 0 auto;padding:12px 16px;background:#1f2937;border-radius:10px;border:2px solid #374151;font-weight:800;cursor:pointer;font-size:13px}
.hub-btn.active{border-color:var(--green);background:var(--green);color:#000}
.hub-view{display:none;padding:12px}
.hub-view.active{display:block}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:12px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:15px;margin-top:8px;background:var(--green);color:#000}
.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-purple{background:var(--purple)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.prod{background:#1f2937;padding:0;border-radius:12px;cursor:pointer;text-align:center;border:1px solid #374151;overflow:hidden}
.prod img{width:100%;height:100px;object-fit:cover;background:#222}
.prod-body{padding:8px}
.table{width:100%;font-size:12px;border-collapse:collapse}
.table td{padding:8px;border-bottom:1px solid #1f2937}
input,select,textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #374151;background:#0a0a0a;color:#f1f5f9;margin-bottom:10px}
.notification{position:fixed;top:20px;right:20px;background:var(--green);color:#000;padding:12px;border-radius:10px;z-index:9999;display:none;font-weight:800}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:999}
.modal.active{display:flex}
.modal-card{background:var(--card);padding:20px;border-radius:16px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto}
.hidden{display:none}
.float-cart{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;border-radius:50px;padding:16px 24px;font-weight:800;z-index:99;box-shadow:0 4px 20px #000}
.share-box{background:#1f2937;padding:12px;border-radius:10px;margin:12px 0}
</style>
</head>
<body>

<div id="adminApp" class="hidden">
  <div class="header">
    <h1>⚡ OMNI-HUB v4.0.0 ADMIN</h1>
    <div><span style="font-size:12px;color:var(--gold)" id="roleBadge"></span><button class="btn-red" style="padding:8px 12px;margin-left:8px" onclick="logout()">EXIT</button></div>
  </div>
  <div class="notification" id="notification"></div>
  <div id="ageModal" class="modal"><div class="modal-card"><h2>🍺 TAVERN COMPLIANCE</h2><button class="btn" onclick="ageConfirm(true)">YES</button><button class="btn btn-red" onclick="ageConfirm(false)">NO</button></div></div>
  <div id="invoiceModal" class="modal"><div class="modal-card"><h2>🧾 INVOICE DETAILS</h2><input id="invClient" placeholder="Client Name"><input id="invPhone" placeholder="Phone/WhatsApp"><textarea id="invAddr" placeholder="Address"></textarea><button class="btn" onclick="saveInvoice()">SAVE & PRINT PDF</button><button class="btn btn-red" onclick="document.getElementById('invoiceModal').classList.remove('active')">CANCEL</button></div></div>

  <div class="share-box"><b>CLIENT LINK:</b> <input id="clientLink" readonly onclick="this.select()"><button class="btn btn-blue" onclick="navigator.clipboard.writeText(document.getElementById('clientLink').value);notify('Copied')">COPY</button></div>
  
  <div class="hub-tabs" id="hubTabs"></div>
  <div id="hubViews"></div>
</div>

<div id="clientApp" class="hidden">
  <div class="client-header"><h1>⚡ SparesHub STORE</h1><p>Browse all categories below</p></div>
  <div class="hub-tabs" id="clientHubTabs"></div>
  <div id="clientHubViews"></div>
  <div class="float-cart" onclick="openClientCart()">🛒 <span id="cartCount">0</span> | R<span id="cartTotal">0.00</span></div>
  <div id="clientCartModal" class="modal"><div class="modal-card"><h2>🛒 YOUR CART</h2><div id="clientCartList"></div><button class="btn" onclick="openClientInvoice()">GET QUOTE ON WHATSAPP</button><button class="btn btn-red" onclick="document.getElementById('clientCartModal').classList.remove('active')">CLOSE</button></div></div>
</div>

<div id="loginScreen">
  <div class="modal-card" style="margin:10vh auto">
    <h2>⚡ OMNI-HUB ADMIN LOGIN</h2>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <select id="loginRole"><option value="cashier">Cashier</option><option value="manager">Management</option></select>
    <button class="btn" onclick="login()">LOGIN</button>
    <hr style="margin:12px 0">
    <a href="?client" class="btn btn-blue" style="text-align:center;display:block;text-decoration:none">OPEN CLIENT STORE</a>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;
const IS_CLIENT = window.location.search.includes('client');

let CURRENT_ROLE='manager', ACTIVE_HUB='bricks', CART=[], PENDING_ALCOHOL=null;

const HUBS = JSON.parse(localStorage.getItem('HUBS_DATA_V4')||'null') || {
  bricks:{name:'🧱 Bricks', products:[{sku:'B6',name:'6" Brick',price:3.20,stock:500,cost:2.10,img:'https://images.unsplash.com/photo-1591088398332-8a7791972843?w=300'}]},
  tavern:{name:'🍺 Tavern', products:[{sku:'BEER',name:'Castle 500ml',price:22,stock:100,cost:15,alcohol:true,img:'https://images.unsplash.com/photo-1608270586620-57bd79aacb6d?w=300'}]},
  water:{name:'💧 Water', products:[{sku:'WATER25',name:'Water 25L Drum',price:35,stock:50,cost:20,img:'https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=300'}]},
  diesel:{name:'⛽ Diesel', products:[{sku:'DSL',name:'Diesel/L',price:24.50,stock:5000,cost:22,img:'https://images.unsplash.com/photo-1549399542-7e3f8b79c341?w=300'}]},
  sand:{name:'🏜️ Sand', products:[{sku:'RIVER',name:'River Sand/m³',price:450,stock:100,cost:300,img:'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=300'}]},
  chickens:{name:'🐔 Chickens', products:[{sku:'CHICK',name:'Live Chicken/kg',price:28,stock:100,cost:20,img:'https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?w=300'}]},
  scrap:{name:'🔩 Scrap', products:[{sku:'TYRE15',name:'VW Tyre 15"',price:350,stock:12,cost:200,vin:'WVWZZZ',img:'https://images.unsplash.com/photo-1486262710619-324dbdee2a17?w=300'}]},
  transport:{name:'🚌 Transport', products:[{sku:'JHB',name:'Polokwane-JHB',price:80,stock:20,cost:50,img:'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=300'}]},
  restaurant:{name:'🍔 Restaurant', products:[{sku:'BURGER',name:'Burger',price:55,stock:0,cost:30,img:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300'}]}
};

function saveHubs(){localStorage.setItem('HUBS_DATA_V4',JSON.stringify(HUBS));}
function notify(msg){let n=document.getElementById('notification');n.textContent=msg;n.style.display='block';setTimeout(()=>n.style.display='none',2500);}

function init(){
  if(IS_CLIENT){
    document.getElementById('clientApp').classList.remove('hidden');
    document.getElementById('loginScreen').classList.add('hidden');
    renderClientHubs();
  }else{
    document.getElementById('adminApp').classList.remove('hidden');
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('clientLink').value = window.location.origin + window.location.pathname + '?client';
    document.getElementById('roleBadge').textContent = CURRENT_ROLE.toUpperCase();
    renderAdminHubs();
  }
}
function login(){CURRENT_ROLE=document.getElementById('loginRole').value;init();}
function logout(){window.location.search='';}

function renderAdminHubs(){
  document.getElementById('hubTabs').innerHTML = Object.keys(HUBS).map(k=>`<div class="hub-btn ${k===ACTIVE_HUB?'active':''}" onclick="switchAdminHub('${k}')">${HUBS[k].name}</div>`).join('');
  renderAdminView();
}
function switchAdminHub(h){ACTIVE_HUB=h;renderAdminHubs();}
function renderAdminView(){
  let p=HUBS[ACTIVE_HUB].products;
  document.getElementById('hubViews').innerHTML = `
  <div class="hub-view active">
    <div class="card"><h3>${HUBS[ACTIVE_HUB].name} - ADMIN</h3>
      <div class="product-grid">${p.map(x=>`<div class="prod"><img src="${x.img||''}"><div class="prod-body">${x.name}<br>R${x.price}<br><small>Stock:${x.stock}</small></div></div>`).join('')}</div>
      <hr style="margin:12px 0">
      <h4>+ ADD/EDIT PRODUCT</h4>
      <input id="newSku" placeholder="SKU">
      <input id="newName" placeholder="Name">
      <input id="newPrice" type="number" placeholder="Price">
      <input id="newStock" type="number" placeholder="Stock">
      <input id="newImg" type="file" accept="image/*" onchange="uploadImg(event)">
      <img id="imgPreview" style="width:100%;max-height:120px;object-fit:cover;display:none">
      <button class="btn btn-purple" onclick="addProduct()">SAVE PRODUCT</button>
    </div>
  </div>`;
}
let UPLOADED_IMG='';
function uploadImg(e){let f=e.target.files[0];let r=new FileReader();r.onload=ev=>{UPLOADED_IMG=ev.target.result;document.getElementById('imgPreview').src=UPLOADED_IMG;document.getElementById('imgPreview').style.display='block';};r.readAsDataURL(f);}
function addProduct(){let sku=document.getElementById('newSku').value.toUpperCase();if(!sku)return notify('SKU required');HUBS[ACTIVE_HUB].products.push({sku,name:document.getElementById('newName').value,price:parseFloat(document.getElementById('newPrice').value),stock:parseInt(document.getElementById('newStock').value),img:UPLOADED_IMG});saveHubs();notify('Product Added');UPLOADED_IMG='';renderAdminView();}

function renderClientHubs(){
  document.getElementById('clientHubTabs').innerHTML = Object.keys(HUBS).map(k=>`<div class="hub-btn ${k===ACTIVE_HUB?'active':''}" onclick="switchClientHub('${k}')">${HUBS[k].name}</div>`).join('');
  renderClientView();
}
function switchClientHub(h){ACTIVE_HUB=h;renderClientHubs();}
function renderClientView(){
  let p=HUBS[ACTIVE_HUB].products;
  document.getElementById('clientHubViews').innerHTML = `
  <div class="hub-view active">
    <div class="card"><h3>${HUBS[ACTIVE_HUB].name}</h3>
      <div class="product-grid">${p.map(x=>`<div class="prod" onclick="clientAdd('${x.sku}')"><img src="${x.img||''}"><div class="prod-body">${x.name}<br><b>R${x.price}</b></div></div>`).join('')}</div>
    </div>
  </div>`;
  updateCartFloat();
}
function clientAdd(sku){let x=HUBS[ACTIVE_HUB].products.find(i=>i.sku===sku);let ex=CART.find(i=>i.sku===sku);if(ex){ex.qty++;}else{CART.push({...x,qty:1});}notify(`Added ${x.name}`);updateCartFloat();}
function updateCartFloat(){document.getElementById('cartCount').textContent=CART.reduce((a,b)=>a+b.qty,0);document.getElementById('cartTotal').textContent=CART.reduce((a,b)=>a+b.price*b.qty,0).toFixed(2);}
function openClientCart(){document.getElementById('clientCartList').innerHTML=CART.map((i,idx)=>`<div class="row"><span>${i.name} x${i.qty}</span><button class="btn-red" style="padding:4px 8px" onclick="CART.splice(${idx},1);openClientCart();updateCartFloat()">x</button></div>`).join('')||'Cart Empty';document.getElementById('clientCartModal').classList.add('active');}
function openClientInvoice(){let total=CART.reduce((a,b)=>a+b.price*b.qty,0)*1.15;let msg=`Hi SparesHub, I want to buy:\n${CART.map(i=>`${i.name} x${i.qty} = R${i.price*i.qty}`).join('\n')}\n\nTotal incl VAT: R${total.toFixed(2)}`;window.open(`https://wa.me/27XXXXXXXXXX?text=${encodeURIComponent(msg)}`,'_blank');}

function ageConfirm(ok){document.getElementById('ageModal').classList.remove('active');}

init();
</script>
</body>
</html>
