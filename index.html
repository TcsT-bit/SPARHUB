<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#16a34a">
<link rel="manifest" href="manifest.json">
<title>SparesHub OMNI-HUB v5.7.4 PWA</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{--bg:#0a0a0a;--card:#111827;--green:#16a34a;--red:#dc2626;--blue:#3b82f6;--gold:#fbbf24;--orange:#ea580c;--purple:#a855f7}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:manipulation}
body{background:var(--bg);color:#f1f5f9;font-size:14px}
.header{background:linear-gradient(135deg,#16a34a,#3b82f6,#a855f7);padding:12px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.client-header{background:#111827;padding:12px;text-align:center}
.hub-tabs{display:flex;gap:6px;overflow-x:auto;padding:12px;background:#111827;border-bottom:1px solid #1f2937}
.hub-btn{flex:0 0 auto;padding:12px 16px;background:#1f2937;border-radius:10px;border:2px solid #374151;font-weight:800;cursor:pointer;font-size:13px;white-space:nowrap}
.hub-btn.active{border-color:var(--green);background:var(--green);color:#000}
.hub-view{display:none;padding:12px}
.hub-view.active{display:block}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:12px;border:1px solid #1f2937}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:15px;margin-top:8px;background:var(--green);color:#000}
.btn-sm{padding:6px 10px;font-size:12px;width:auto;margin:2px}
.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-purple{background:var(--purple)}.btn-orange{background:var(--orange)}.btn-gold{background:var(--gold);color:#000}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.prod{background:#1f2937;padding:0;border-radius:12px;cursor:pointer;text-align:center;border:1px solid #374151;overflow:hidden;position:relative}
.prod img{width:100%;height:100px;object-fit:cover;background:#222}
.prod-body{padding:8px}
.delete-x{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;border-radius:50%;width:24px;height:24px;border:none;font-weight:800;z-index:2}
.stock-controls{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
input,select,textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #374151;background:#0a0a0a;color:#f1f5f9;margin-bottom:10px}
.notification{position:fixed;top:20px;right:20px;background:var(--green);color:#000;padding:12px;border-radius:10px;z-index:9999;display:none;font-weight:800}
.alert{background:var(--red);color:#fff;padding:10px;border-radius:10px;margin-bottom:12px;font-weight:800}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:999}
.modal.active{display:flex}
.modal-card{background:var(--card);padding:20px;border-radius:16px;max-width:700px;width:95%;max-height:90vh;overflow-y:auto}
.hidden{display:none}
.float-cart{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;border-radius:50px;padding:16px 24px;font-weight:800;z-index:99;box-shadow:0 4px 20px #000}
.float-install{position:fixed;bottom:90px;right:20px;background:var(--gold);color:#000;border-radius:50px;padding:14px 20px;font-weight:800;z-index:99;box-shadow:0 4px 20px #000;display:none}
.share-box{background:#1f2937;padding:12px;border-radius:10px;margin:12px 0}
.badge{background:var(--purple);padding:2px 6px;border-radius:6px;font-size:10px}
.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.kpi-box{background:#1f2937;padding:10px;border-radius:10px;text-align:center}
.kpi-box b{font-size:18px;color:var(--gold)}
.row{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 #16a34a}70%{box-shadow:0 0 0 10px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
#reader{width:100%;border-radius:12px;overflow:hidden}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.pin-btn{padding:20px;font-size:24px;font-weight:800;background:#1f2937;border:none;color:#fff;border-radius:12px}
.catbox-help{font-size:11px;color:var(--gold);margin-top:-8px;margin-bottom:8px}
.catbox-frame{width:100%;height:400px;border:1px solid #374151;border-radius:10px;margin-bottom:8px;background:#000}
</style>
</head>
<body>

<div id="adminApp" class="hidden">
  <div class="header">
    <h1>⚡ OMNI-HUB v5.7.4 <span class="live-dot"></span> <span id="userName"></span></h1>
    <div><span style="font-size:12px;color:var(--gold)" id="roleBadge"></span><button class="btn-red" style="padding:8px 12px;margin-left:8px" onclick="logout()">EXIT</button></div>
  </div>
  <div class="notification" id="notification"></div>
  <div id="lowStockAlert"></div>

  <div id="scannerModal" class="modal"><div class="modal-card"><h2>📷 BARCODE SCANNER</h2><div id="reader"></div><button class="btn btn-red" onclick="stopScanner()">CLOSE</button></div></div>
  <div id="ageModal" class="modal"><div class="modal-card"><h2>🍺 TAVERN COMPLIANCE - 18+ ONLY</h2><button class="btn" onclick="ageConfirm(true)">YES</button><button class="btn btn-red" onclick="ageConfirm(false)">NO</button></div></div>
  <div id="invoiceModal" class="modal"><div class="modal-card"><h2>🧾 INVOICE</h2>
    <input id="invCompany" value="SparesHub Pty Ltd"><input id="invReg" value="VAT: 4123456789">
    <input id="invClient" placeholder="Client Name" required><input id="invPhone" placeholder="Phone" required>
    <textarea id="invAddr" placeholder="Address" required></textarea>
    <button class="btn" onclick="saveInvoice()">GENERATE PDF + QR</button><button class="btn btn-red" onclick="closeModal('invoiceModal')">CANCEL</button>
  </div></div>
  <div id="qrcanvas" class="hidden"></div>

  <div class="share-box"><b>CLIENT LINK:</b> <input id="clientLink" readonly onclick="this.select()"><button class="btn btn-blue btn-sm" onclick="copyLink()">COPY</button></div>

  <div class="card"><h3>📊 SALES DASHBOARD [LIVE]</h3><div class="kpi" id="dashboard"></div></div>
  <div class="card"><button class="btn btn-blue" onclick="startScanner()">📷 SCAN BARCODE</button></div>

  <div class="hub-tabs" id="hubTabs"></div>
  <div id="hubViews"></div>
  <div class="float-cart" onclick="openAdminCart()">🛒 <span id="adminCartCount">0</span> | R<span id="adminCartTotal">0.00</span></div>
  <div id="adminCartModal" class="modal"><div class="modal-card"><h2>🛒 ADMIN CART</h2><div id="adminCartList"></div><button class="btn btn-gold" onclick="document.getElementById('invoiceModal').classList.add('active');closeModal('adminCartModal')">CREATE INVOICE</button><button class="btn btn-red" onclick="closeModal('adminCartModal')">CLOSE</button></div></div>
</div>

<div id="clientApp" class="hidden">
  <div class="client-header"><h1>⚡ SparesHub STORE <span class="live-dot"></span></h1></div>
  <div class="float-install" id="installBtn" onclick="installApp()">📲 INSTALL APP</div>
  <div id="clientLowStockAlert"></div> <!-- CLIENT LOW STOCK BANNER -->
  <div class="hub-tabs" id="clientHubTabs"></div>
  <div id="clientHubViews"></div>
  <div class="float-cart" onclick="openClientCart()">🛒 <span id="cartCount">0</span> | R<span id="cartTotal">0.00</span></div>
  <div id="clientCartModal" class="modal"><div class="modal-card"><h2>🛒 YOUR CART</h2><div id="clientCartList"></div><button class="btn" onclick="openClientInvoice()">GET QUOTE ON WHATSAPP</button><button class="btn btn-red" onclick="closeModal('clientCartModal')">CLOSE</button></div></div>
</div>

<div id="loginScreen">
  <div class="modal-card" style="margin:10vh auto">
    <h2>⚡ OMNI-HUB ADMIN PIN</h2>
    <input id="pinDisplay" readonly placeholder="Enter 4-Digit PIN" style="font-size:24px;text-align:center">
    <div class="pin-grid" id="pinGrid"></div>
    <button class="btn btn-red" onclick="clearPin()">CLEAR</button>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;
const IS_CLIENT = location.search.includes('client');
const WHATSAPP_NUMBER = '27698949596';
const LOW_STOCK_LIMIT = 10;
let DEFERRED_PROMPT = null;

const USERS = {
  '1234':{name:'CEO',role:'owner'},
  '5678':{name:'Manager',role:'manager'},
  '0000':{name:'Cashier',role:'cashier'},
  'client':{name:'Guest',role:'client'}
};

firebase.initializeApp({
    apiKey: "AIzaSyDU3m6DUDpXugBs-PW4Aqn_WvbbHbGq6mg",
    authDomain: "omega---dms.firebaseapp.com",
    projectId: "omega---dms",
    storageBucket: "omega---dms.firebasestorage.app",
    messagingSenderId: "194803652821",
    appId: "1:194803652821:web:07c6dc73aba1ce681a2a5c"
});
const db = firebase.firestore();

let CURRENT_USER=null, CURRENT_ROLE='owner', ACTIVE_HUB='bricks', CART=[], ADMIN_CART=[], PENDING_ALCOHOL=null, HUBS={}, SALES_LOG=[], HTML5QrCode=null;

const DEFAULT_HUBS = {
  bricks:{name:'🧱 Bricks | Builders OS', kpis:{moq:'1000',delivery:'48H',credit:'30'}, products:[{sku:'B6',barcode:'6001234567890',name:'6" Brick NFX',price:3.20,stock:500,cost:2.10,img:'https://images.unsplash.com/photo-1591088398332-8a7791972843?w=300',specs:'14Mpa, SABS 227'}]},
  tavern:{name:'🍺 Tavern | Makro Liquor OS', kpis:{license:'RICA',cold:'-4C',pos:'Scan'}, products:[{sku:'BEER',barcode:'6001234567891',name:'Castle Lager 500ml',price:22,stock:100,cost:15,alcohol:true,img:'https://images.unsplash.com/photo-1608270586620-57bd79aacb6d?w=300',specs:'18+ ID Scan Required'}]},
  restaurant:{name:'🍔 Restaurant | Nandos OS', kpis:{pos:'Kitchen',prep:'8min',loyal:'App'}, products:[{sku:'BURGER',barcode:'6001234567898',name:'Chicken Burger',price:55,stock:0,cost:30,img:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300',specs:'Halal'}]}
};

function notify(msg){let n=document.getElementById('notification');n.textContent=msg;n.style.display='block';setTimeout(()=>n.style.display='none',2500);}
function closeModal(id){document.getElementById(id).classList.remove('active'); if(HTML5QrCode){HTML5QrCode.stop();}}
function copyLink(){navigator.clipboard.writeText(document.getElementById('clientLink').value);notify('Link Copied');}

window.addEventListener('beforeinstallprompt', (e) => {e.preventDefault(); DEFERRED_PROMPT = e; if(IS_CLIENT) document.getElementById('installBtn').style.display='block';});
function installApp(){if(DEFERRED_PROMPT){DEFERRED_PROMPT.prompt(); DEFERRED_PROMPT.userChoice.then(()=>{document.getElementById('installBtn').style.display='none';});}}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}

function renderPin(){let g=document.getElementById('pinGrid');g.innerHTML=[1,2,3,4,5,6,7,8,9,0,'<','OK'].map(k=>`<button class="pin-btn" onclick="pressPin('${k}')">${k}</button>`).join('');}
function pressPin(k){let d=document.getElementById('pinDisplay');if(k==='OK'){loginPin(d.value);}else if(k==='<'){d.value=d.value.slice(0,-1);}else if(d.value.length<4){d.value+=k;}}
function clearPin(){document.getElementById('pinDisplay').value='';}
function loginPin(pin){if(USERS[pin]){CURRENT_USER=USERS[pin];CURRENT_ROLE=CURRENT_USER.role;document.getElementById('userName').textContent=CURRENT_USER.name;document.getElementById('roleBadge').textContent=CURRENT_ROLE.toUpperCase();init();}else{notify('Invalid PIN');clearPin();}}

async function loadHubs(){
  try{
    const doc = await db.collection('omnihub').doc('hubs').get();
    HUBS = doc.exists? doc.data() : DEFAULT_HUBS;
    if(!doc.exists) await db.collection('omnihub').doc('hubs').set(HUBS);
    const salesDoc = await db.collection('omnihub').doc('sales').get();
    SALES_LOG = salesDoc.exists? salesDoc.data().log||[] : [];
  }catch(e){console.error(e);notify('DB Error: Check Firestore Rules');HUBS=DEFAULT_HUBS;}
  checkLowStock(); renderDashboard();
  if(IS_CLIENT){renderClientHubs();}else{renderAdminHubs();}
}
async function saveHubs(){await db.collection('omnihub').doc('hubs').set(HUBS); checkLowStock();}
async function saveSales(){await db.collection('omnihub').doc('sales').set({log:SALES_LOG}); renderDashboard();}

function init(){
  // FIX #2: REMOVED history.replaceState. KEEP?client IN URL SO REFRESH STAYS CLIENT
  if(IS_CLIENT){
    CURRENT_USER=USERS.client; CURRENT_ROLE='client';
    document.getElementById('clientApp').classList.remove('hidden');
    document.getElementById('loginScreen').classList.add('hidden');
    loadHubs(); db.collection('omnihub').doc('hubs').onSnapshot(loadHubs);
  }else{
    document.getElementById('adminApp').classList.remove('hidden');
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('clientLink').value = location.origin + location.pathname + '?client';
    loadHubs(); db.collection('omnihub').doc('hubs').onSnapshot(loadHubs); db.collection('omnihub').doc('sales').onSnapshot(loadHubs);
  }
}
function logout(){location.search=''; location.reload();}
function canDelete(){return CURRENT_ROLE==='owner';}
function canEdit(){return CURRENT_ROLE==='owner'||CURRENT_ROLE==='manager';}

function renderDashboard(){let t=new Date().toDateString();let s=SALES_LOG.filter(x=>new Date(x.date).toDateString()===t);let ts=s.reduce((a,b)=>a+b.total,0);let tp=s.reduce((a,b)=>a+b.profit,0);let top=s.length?s.reduce((a,b)=>a.qty>b.qty?a:b):{name:'N/A',qty:0};let lc=Object.values(HUBS).flatMap(h=>h.products).filter(p=>p.stock<LOW_STOCK_LIMIT).length;document.getElementById('dashboard').innerHTML=`<div class="kpi-box"><small>SALES TODAY</small><br><b>R${ts.toFixed(2)}</b></div><div class="kpi-box"><small>PROFIT</small><br><b>R${tp.toFixed(2)}</b></div><div class="kpi-box"><small>TOP ITEM</small><br><b>${top.name}</b></div><div class="kpi-box"><small>LOW STOCK</small><br><b>${lc}</b></div>`;}

// FIX #1: NO MORE WHATSAPP AUTO ALERT. ONLY DASHBOARD BANNER
function checkLowStock(){
  let l=Object.entries(HUBS).flatMap(([k,h])=>h.products.filter(p=>p.stock<LOW_STOCK_LIMIT).map(p=>`${h.name.split('|')[0]}: ${p.name} ${p.stock}`));

  // ADMIN BANNER
  let d=document.getElementById('lowStockAlert');
  d.innerHTML=l.length?`<div class="alert">⚠️ LOW STOCK: ${l.join(', ')}</div>`:'';

  // CLIENT BANNER
  let dc=document.getElementById('clientLowStockAlert');
  if(dc){dc.innerHTML=l.length?`<div class="alert">⚠️ LOW STOCK: ${l.join(', ')}</div>`:'';}
}

function startScanner(){document.getElementById('scannerModal').classList.add('active'); HTML5QrCode = new Html5Qrcode("reader"); HTML5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);}
function stopScanner(){closeModal('scannerModal');}
function onScanSuccess(code){stopScanner(); let p = Object.values(HUBS).flatMap(h=>h.products).find(x=>x.barcode===code); if(p){adminAddCart(p.sku); notify(`Scanned: ${p.name}`);} else{notify('Not found');}}

function renderAdminHubs(){document.getElementById('hubTabs').innerHTML=Object.keys(HUBS).map(k=>`<div class="hub-btn ${k===ACTIVE_HUB?'active':''}" onclick="switchAdminHub('${k}')">${HUBS[k].name}</div>`).join('');renderAdminView();}
function switchAdminHub(h){ACTIVE_HUB=h;renderAdminHubs();}
function renderAdminView(){let h=HUBS[ACTIVE_HUB],p=h.products;document.getElementById('hubViews').innerHTML=`<div class="card"><h3>${h.name}</h3><div class="kpi">${Object.entries(h.kpis).map(([k,v])=>`<div class="kpi-box"><small>${k.toUpperCase()}</small><br><b>${v}</b></div>`).join('')}</div></div><div class="card"><h4>📦 INVENTORY</h4><div class="product-grid">${p.map((x,i)=>`<div class="prod">${canDelete()?`<button class="delete-x" onclick="deleteProduct(${i})">X</button>`:''}<img src="${x.img||''}"><div class="prod-body">${x.name}<br>R${x.price}<br><small>Stock:${x.stock}</small><br><small>BC:${x.barcode||'N/A'}</small><br><span class="badge">${x.specs}</span>${canEdit()?`<div class="stock-controls"><button class="btn-sm btn-orange" onclick="adjStock(${i},-1)">-1</button><button class="btn-sm btn-blue" onclick="adjStock(${i},1)">+1</button><button class="btn-sm btn-purple" onclick="setStock(${i})">SET</button><button class="btn-sm btn-blue" onclick="adminAddCart('${x.sku}')">+CART</button></div>`:''}</div></div>`).join('')}</div><hr style="margin:12px 0">${canEdit()?`<h4>+ ADD PRODUCT</h4><input id="newSku" placeholder="SKU*"><input id="newBarcode" placeholder="Barcode*"><input id="newName" placeholder="Name*"><input id="newPrice" type="number" placeholder="Price*"><input id="newCost" type="number" placeholder="Cost"><input id="newStock" type="number" placeholder="Stock*" value="0"><input id="newSpecs" placeholder="Specs"><iframe src="https://catbox.moe" class="catbox-frame"></iframe><div class="catbox-help">1.Upload > Copy Link > 2.PASTE</div><div style="display:flex;gap:6px"><input id="newImgUrl" placeholder="Paste https://files.catbox.moe/xxx.jpg" oninput="previewUrl(this.value)" style="flex:1"><button class="btn-sm btn-gold" onclick="pasteLink()">📋 PASTE</button></div><img id="imgPreview" style="width:100%;max-height:120px;object-fit:cover;display:none;margin-top:8px"><button class="btn btn-purple" onclick="addProduct()">SAVE PRODUCT</button>`:''}</div><div class="card"><h4>🧾 INVOICE</h4><button class="btn btn-gold" onclick="ADMIN_CART.length?document.getElementById('invoiceModal').classList.add('active'):notify('Add items first')">OPEN INVOICE</button></div>`;}

async function pasteLink(){try{const t=await navigator.clipboard.readText();if(t.startsWith('https://files.catbox.moe/')){document.getElementById('newImgUrl').value=t;previewUrl(t);notify('Pasted ✅');}else{notify('No Catbox link');}}catch(e){notify('Clipboard denied');}}
function previewUrl(u){document.getElementById('imgPreview').style.display=u.startsWith('http')?'block':'none';document.getElementById('imgPreview').src=u;}
async function addProduct(){let s=document.getElementById('newSku').value.toUpperCase().trim();let b=document.getElementById('newBarcode').value.trim();let n=document.getElementById('newName').value.trim();let p=parseFloat(document.getElementById('newPrice').value);let st=parseInt(document.getElementById('newStock').value);if(!s||!b||!n||isNaN(p)||isNaN(st))return notify('Required');HUBS[ACTIVE_HUB].products.push({sku:s,barcode:b,name:n,price:p,cost:parseFloat(document.getElementById('newCost').value)||0,stock:st,specs:document.getElementById('newSpecs').value,img:document.getElementById('newImgUrl').value.trim()});await saveHubs();notify('Added');['newSku','newBarcode','newName','newPrice','newCost','newStock','newSpecs','newImgUrl'].forEach(id=>document.getElementById(id).value='');document.getElementById('imgPreview').style.display='none';}
async function deleteProduct(i){if(!canDelete())return;if(confirm('DELETE?')){HUBS[ACTIVE_HUB].products.splice(i,1);await saveHubs();notify('Deleted');}}
async function adjStock(i,d){if(!canEdit())return;HUBS[ACTIVE_HUB].products[i].stock=Math.max(0,HUBS[ACTIVE_HUB].products[i].stock+d);await saveHubs();}
async function setStock(i){if(!canEdit())return;let v=prompt('Set stock:');let n=parseInt(v);if(!isNaN(n)){HUBS[ACTIVE_HUB].products[i].stock=n;await saveHubs();}}

function adminAddCart(s){let x=HUBS[ACTIVE_HUB].products.find(i=>i.sku===s);if(x.stock<=0)return notify('OUT OF STOCK');let e=ADMIN_CART.find(i=>i.sku===s);e?e.qty++:ADMIN_CART.push({...x,qty:1});notify(`Added ${x.name}`);updateAdminCartFloat();}
function updateAdminCartFloat(){document.getElementById('adminCartCount').textContent=ADMIN_CART.reduce((a,b)=>a+b.qty,0);document.getElementById('adminCartTotal').textContent=ADMIN_CART.reduce((a,b)=>a+b.price*b.qty,0).toFixed(2);}
function openAdminCart(){document.getElementById('adminCartList').innerHTML=ADMIN_CART.map((i,idx)=>`<div class="row"><span>${i.name} x${i.qty}</span><button class="btn-red btn-sm" onclick="ADMIN_CART.splice(${idx},1);openAdminCart();updateAdminCartFloat()">x</button></div>`).join('')||'Cart Empty';document.getElementById('adminCartModal').classList.add('active');}

function renderClientHubs(){document.getElementById('clientHubTabs').innerHTML=Object.keys(HUBS).map(k=>`<div class="hub-btn ${k===ACTIVE_HUB?'active':''}" onclick="switchClientHub('${k}')">${HUBS[k].name.split('|')[0]}</div>`).join('');renderClientView();}
function switchClientHub(h){ACTIVE_HUB=h;renderClientHubs();}
function renderClientView(){let h=HUBS[ACTIVE_HUB],p=h.products;document.getElementById('clientHubViews').innerHTML=`<div class="card"><h3>${h.name.split('|')[0]}</h3><small>${h.name.split('|')[1]||''}</small><div class="product-grid">${p.map(x=>`<div class="prod" onclick="clientAdd('${x.sku}')"><img src="${x.img||''}"><div class="prod-body">${x.name}<br><b>R${x.price}</b><br><small>Stock:${x.stock}</small><br><small>BC:${x.barcode||'N/A'}</small><br><span class="badge">${x.specs}</span></div></div>`).join('')}</div></div>`;updateCartFloat();}
function clientAdd(s){let x=HUBS[ACTIVE_HUB].products.find(i=>i.sku===s);if(x.stock<=0)return notify('OUT OF STOCK');if(x.alcohol){PENDING_ALCOHOL=x;document.getElementById('ageModal').classList.add('active');return;}let e=CART.find(i=>i.sku===s);e?e.qty++:CART.push({...x,qty:1});notify(`Added ${x.name}`);updateCartFloat();}
function ageConfirm(o){closeModal('ageModal');if(o){let x=PENDING_ALCOHOL;let e=CART.find(i=>i.sku===x.sku);e?e.qty++:CART.push({...x,qty:1});notify(`Added ${x.name} 18+`);updateCartFloat();}PENDING_ALCOHOL=null;}
function updateCartFloat(){document.getElementById('cartCount').textContent=CART.reduce((a,b)=>a+b.qty,0);document.getElementById('cartTotal').textContent=CART.reduce((a,b)=>a+b.price*b.qty,0).toFixed(2);}
function openClientCart(){document.getElementById('clientCartList').innerHTML=CART.map((i,idx)=>`<div class="row"><span>${i.name} x${i.qty}</span><button class="btn-red btn-sm" onclick="CART.splice(${idx},1);openClientCart();updateCartFloat()">x</button></div>`).join('')||'Cart Empty';document.getElementById('clientCartModal').classList.add('active');}
function openClientInvoice(){if(CART.length===0)return notify('Cart empty');let s=CART.reduce((a,b)=>a+b.price*b.qty,0);let v=s*0.15;let t=s+v;let m=`Hi SparesHub Quote:\n${CART.map(i=>`${i.name} x${i.qty} = R${(i.price*i.qty).toFixed(2)}`).join('\n')}\n\nSubtotal: R${s.toFixed(2)}\nVAT 15%: R${v.toFixed(2)}\nTotal: R${t.toFixed(2)}`;window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(m)}`,'_blank');}

async function saveInvoice(){let c=IS_CLIENT?CART:ADMIN_CART;if(c.length===0)return notify('Cart empty');const cl=document.getElementById('invClient').value.trim();const ph=document.getElementById('invPhone').value.trim();const ad=document.getElementById('invAddr').value.trim();if(!cl||!ph||!ad)return notify('Fill all');const d=new jsPDF();const no='INV'+Date.now();const sub=c.reduce((a,b)=>a+b.price*b.qty,0);const vat=sub*0.15;const tot=sub+vat;const pr=c.reduce((a,b)=>(b.price-b.cost)*b.qty,0);d.text(document.getElementById('invCompany').value,14,20);d.text(document.getElementById('invReg').value,14,27);d.text('INVOICE: '+no,140,20);d.text(new Date().toLocaleDateString(),140,27);d.text('BILL TO:',14,40);d.text(cl,14,46);d.text(ph,14,52);d.text(ad,14,58);let y=75;d.text('ITEM',14,y);d.text('QTY',90,y);d.text('PRICE',120,y);d.text('TOTAL',160,y);y+=8;c.forEach(i=>{d.text(i.name.substring(0,25),14,y);d.text(i.qty.toString(),90,y);d.text('R'+i.price,120,y);d.text('R'+(i.price*i.qty).toFixed(2),160,y);y+=7;});y+=5;d.text('Subtotal: R'+sub.toFixed(2),140,y);y+=7;d.text('VAT 15%: R'+vat.toFixed(2),140,y);y+=7;d.setFontSize(12);d.text('TOTAL: R'+tot.toFixed(2),140,y);document.getElementById('qrcanvas').innerHTML='';new QRCode(document.getElementById('qrcanvas'),{text:no+'|R'+tot.toFixed(2),width:64,height:64});d.addImage(document.getElementById('qrcanvas').querySelector('img').src,'PNG',140,y+5,30,30);d.save(no+'.pdf');SALES_LOG.push({date:new Date().toISOString(),inv:no,total:tot,profit:pr,user:CURRENT_USER.name,items:c.map(i=>({name:i.name,qty:i.qty})),topItem:c.reduce((a,b)=>a.qty>b.qty?a:b).name});await saveSales();c.forEach(it=>{let p=Object.values(HUBS).flatMap(h=>h.products).find(x=>x.sku===it.sku);if(p)p.stock=Math.max(0,p.stock-it.qty);});await saveHubs();c.length=0;updateCartFloat();updateAdminCartFloat();closeModal('invoiceModal');notify('PDF Generated');}

renderPin();
init();
</script>
